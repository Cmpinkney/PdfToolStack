<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />
    <title>PDFToolkit</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <script>
        // Apply theme immediately to prevent flash
        (function () {
            const theme = localStorage.getItem('pdftoolkit-theme') || 'ocean';
            if (theme !== 'ocean') {
                document.documentElement.setAttribute('data-theme', theme);
            }
        })();

        window.setTheme = (theme) => {
            if (theme === 'ocean') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
            localStorage.setItem('pdftoolkit-theme', theme);
        };

        window.getTheme = () => {
            return localStorage.getItem('pdftoolkit-theme') || 'ocean';
        };
    </script>
    <div id="app">
        <div style="text-align:center;padding:4rem;">
            <p>Loading...</p>
        </div>
    </div>
    <div id="blazor-error-ui" style="display:none">
        An error has occurred.
        <a href="" class="reload">Reload</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.downloadFile = (fileName, base64Data) => {
            const extension = fileName.split('.').pop().toLowerCase();
            const mimeTypes = {
                'pdf': 'application/pdf',
                'docx': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document'
            };
            const mimeType = mimeTypes[extension]
                || 'application/octet-stream';
            const link = document.createElement('a');
            link.href = `data:${mimeType};base64,` + base64Data;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        let dotNetHelper = null;
        let isDrawing = false;
        let startX = 0, startY = 0;
        let currentRegions = [];
        let pdfDoc = null;

        window.initRedactCanvas = (helper) => {
            dotNetHelper = helper;
        };

        window.renderPdfPage = async (base64Data, pageNum) => {
            try {
                const pdfCanvas = document.getElementById('pdfCanvas');
                const redactCanvas = document.getElementById('redactCanvas');
                if (!pdfCanvas || !redactCanvas) return;

                pdfjsLib.GlobalWorkerOptions.workerSrc =
                    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

                const binaryData = atob(base64Data);
                const bytes = new Uint8Array(binaryData.length);
                for (let i = 0; i < binaryData.length; i++)
                    bytes[i] = binaryData.charCodeAt(i);

                pdfDoc = await pdfjsLib.getDocument(
                    { data: bytes }).promise;
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.5 });

                pdfCanvas.width = viewport.width;
                pdfCanvas.height = viewport.height;
                redactCanvas.width = viewport.width;
                redactCanvas.height = viewport.height;

                const ctx = pdfCanvas.getContext('2d');
                await page.render({
                    canvasContext: ctx,
                    viewport
                }).promise;

                currentRegions = [];
                clearRedactCanvas();
                setupCanvasEvents(redactCanvas);

            } catch (err) {
                console.error('Error rendering PDF:', err);
            }
        };

        function setupCanvasEvents(canvas) {
            const newCanvas = canvas.cloneNode(true);
            canvas.parentNode.replaceChild(newCanvas, canvas);

            newCanvas.style.cursor = 'crosshair';
            newCanvas.style.position = 'absolute';
            newCanvas.style.top = '0';
            newCanvas.style.left = '0';

            newCanvas.addEventListener('mousedown', (e) => {
                const rect = newCanvas.getBoundingClientRect();
                const scaleX = newCanvas.width / rect.width;
                const scaleY = newCanvas.height / rect.height;
                startX = (e.clientX - rect.left) * scaleX;
                startY = (e.clientY - rect.top) * scaleY;
                isDrawing = true;
            });

            newCanvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const rect = newCanvas.getBoundingClientRect();
                const scaleX = newCanvas.width / rect.width;
                const scaleY = newCanvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;

                const ctx = newCanvas.getContext('2d');
                ctx.clearRect(0, 0,
                    newCanvas.width, newCanvas.height);

                currentRegions.forEach(r => {
                    ctx.fillStyle = 'rgba(0,0,0,0.85)';
                    ctx.fillRect(r.x1, r.y1,
                        r.x2 - r.x1, r.y2 - r.y1);
                });

                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(startX, startY,
                    x - startX, y - startY);
                ctx.strokeStyle = '#2563EB';
                ctx.lineWidth = 2;
                ctx.strokeRect(startX, startY,
                    x - startX, y - startY);
            });

            newCanvas.addEventListener('mouseup', (e) => {
                if (!isDrawing) return;
                isDrawing = false;

                const rect = newCanvas.getBoundingClientRect();
                const scaleX = newCanvas.width / rect.width;
                const scaleY = newCanvas.height / rect.height;
                const endX = (e.clientX - rect.left) * scaleX;
                const endY = (e.clientY - rect.top) * scaleY;

                const x1 = Math.min(startX, endX);
                const y1 = Math.min(startY, endY);
                const x2 = Math.max(startX, endX);
                const y2 = Math.max(startY, endY);

                if (x2 - x1 > 5 && y2 - y1 > 5) {
                    currentRegions.push({ x1, y1, x2, y2 });
                    if (dotNetHelper) {
                        dotNetHelper.invokeMethodAsync(
                            'AddRegion',
                            x1, y1, x2, y2);
                    }
                }

                redrawAllRegions(newCanvas);
            });
        }

        function redrawAllRegions(canvas) {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            currentRegions.forEach(r => {
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(r.x1, r.y1,
                    r.x2 - r.x1, r.y2 - r.y1);
            });
        }

        window.drawRedactPreview = () => { };

        window.redrawRegions = (regions) => {
            currentRegions = regions.map(r => ({
                x1: r.x1, y1: r.y1,
                x2: r.x2, y2: r.y2
            }));
            const canvas = document.getElementById('redactCanvas');
            if (canvas) redrawAllRegions(canvas);
        };

        window.clearRedactCanvas = () => {
            currentRegions = [];
            const canvas = document.getElementById('redactCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };
    </script>
</body>
</html>
