<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Developer working with PDF documents and data</title>
  <desc>Illustration of a developer at a desk surrounded by documents, data charts, and AI-powered tools</desc>

  <style>
    .bg-light { fill: #EFF3FF; }
    .bg-desk  { fill: #E8ECF8; }
    .blue-dark { fill: #2250F4; }
    .blue-mid  { fill: #4F72F6; }
    .blue-light { fill: #A5B8FB; }
    .blue-pale  { fill: #D6E0FD; }
    .gray-dark  { fill: #3D3A5C; }
    .gray-mid   { fill: #6B6892; }
    .gray-light { fill: #C8C6DE; }
    .white-fill { fill: #FFFFFF; }
    .skin       { fill: #FFB8A0; }
    .skin-dark  { fill: #E8917A; }
    .dark-fill  { fill: #1A1830; }
    .green-fill { fill: #34C98A; }
    .amber-fill { fill: #F5A623; }
  </style>

  <!-- Background blob shapes -->
  <ellipse cx="580" cy="80" rx="120" ry="90" class="blue-pale" opacity="0.5"/>
  <ellipse cx="100" cy="340" rx="90" ry="70" class="blue-pale" opacity="0.4"/>

  <!-- Desk surface -->
  <rect x="80" y="280" width="520" height="18" rx="4" class="bg-desk"/>
  <rect x="100" y="296" width="12" height="80" rx="3" class="gray-light"/>
  <rect x="568" y="296" width="12" height="80" rx="3" class="gray-light"/>

  <!-- Monitor -->
  <rect x="260" y="140" width="200" height="142" rx="8" class="dark-fill"/>
  <rect x="268" y="148" width="184" height="118" rx="4" class="white-fill"/>
  <!-- Monitor stand -->
  <rect x="348" y="282" width="24" height="14" rx="2" class="gray-mid"/>
  <rect x="330" y="294" width="60" height="6" rx="3" class="gray-mid"/>

  <!-- Screen content -->
  <rect x="276" y="156" width="60" height="6" rx="2" class="blue-light"/>
  <rect x="276" y="167" width="90" height="5" rx="2" class="gray-light"/>
  <rect x="276" y="177" width="75" height="5" rx="2" class="blue-mid" opacity="0.6"/>
  <rect x="276" y="187" width="100" height="5" rx="2" class="gray-light"/>
  <rect x="276" y="197" width="50" height="5" rx="2" class="green-fill" opacity="0.7"/>
  <rect x="276" y="207" width="85" height="5" rx="2" class="gray-light"/>
  <!-- Mini chart on screen -->
  <rect x="360" y="195" width="10" height="22" rx="2" class="blue-dark"/>
  <rect x="374" y="185" width="10" height="32" rx="2" class="blue-mid"/>
  <rect x="388" y="190" width="10" height="27" rx="2" class="blue-light"/>
  <rect x="402" y="178" width="10" height="39" rx="2" class="blue-dark"/>
  <rect x="416" y="183" width="10" height="34" rx="2" class="blue-mid"/>
  <!-- Screen badge -->
  <rect x="350" y="156" width="80" height="20" rx="10" class="blue-dark"/>
  <text x="390" y="170" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white" font-weight="500">AI Processing</text>

  <!-- Keyboard -->
  <rect x="270" y="270" width="140" height="12" rx="3" class="gray-light"/>
  <rect x="278" y="273" width="8" height="5" rx="1" class="white-fill" opacity="0.8"/>
  <rect x="290" y="273" width="8" height="5" rx="1" class="white-fill" opacity="0.8"/>
  <rect x="302" y="273" width="8" height="5" rx="1" class="white-fill" opacity="0.8"/>
  <rect x="314" y="273" width="8" height="5" rx="1" class="white-fill" opacity="0.8"/>
  <rect x="326" y="273" width="30" height="5" rx="1" class="white-fill" opacity="0.8"/>
  <rect x="360" y="273" width="8" height="5" rx="1" class="white-fill" opacity="0.8"/>
  <rect x="372" y="273" width="8" height="5" rx="1" class="white-fill" opacity="0.8"/>
  <rect x="384" y="273" width="8" height="5" rx="1" class="white-fill" opacity="0.8"/>

  <!-- PDF document stack -->
  <rect x="110" y="240" width="80" height="104" rx="4" class="gray-light"/>
  <rect x="114" y="236" width="80" height="104" rx="4" class="white-fill"/>
  <rect x="118" y="232" width="80" height="104" rx="4" class="blue-pale"/>
  <rect x="125" y="245" width="28" height="10" rx="2" class="blue-dark"/>
  <text x="139" y="253" text-anchor="middle" font-family="sans-serif" font-size="7" fill="white" font-weight="600">PDF</text>
  <rect x="125" y="262" width="60" height="4" rx="1" class="gray-light"/>
  <rect x="125" y="271" width="48" height="4" rx="1" class="gray-light"/>
  <rect x="125" y="280" width="54" height="4" rx="1" class="gray-light"/>
  <rect x="125" y="289" width="40" height="4" rx="1" class="blue-light"/>
  <rect x="125" y="298" width="56" height="4" rx="1" class="gray-light"/>
  <rect x="125" y="307" width="44" height="4" rx="1" class="gray-light"/>

  <!-- Excel/data card -->
  <rect x="500" y="210" width="88" height="72" rx="6" class="white-fill"/>
  <rect x="500" y="210" width="88" height="20" rx="6" class="green-fill"/>
  <rect x="500" y="224" width="88" height="6" class="green-fill"/>
  <text x="544" y="224" text-anchor="middle" font-family="sans-serif" font-size="8" fill="white" font-weight="600">Excel Export</text>
  <line x1="520" y1="236" x2="520" y2="278" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="544" y1="236" x2="544" y2="278" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="568" y1="236" x2="568" y2="278" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="500" y1="246" x2="588" y2="246" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="500" y1="256" x2="588" y2="256" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="500" y1="266" x2="588" y2="266" stroke="#E0E0E0" stroke-width="0.5"/>
  <rect x="502" y="238" width="16" height="6" rx="1" class="blue-pale"/>
  <rect x="526" y="238" width="16" height="6" rx="1" class="blue-pale"/>
  <rect x="502" y="248" width="16" height="6" rx="1" class="gray-light"/>
  <rect x="526" y="248" width="16" height="6" rx="1" class="gray-light"/>
  <rect x="502" y="258" width="16" height="6" rx="1" class="gray-light"/>
  <rect x="526" y="258" width="16" height="6" rx="1" class="gray-light"/>
  <rect x="502" y="268" width="16" height="6" rx="1" class="gray-light"/>
  <rect x="526" y="268" width="16" height="6" rx="1" class="gray-light"/>

  <!-- Person -->
  <rect x="300" y="310" width="80" height="8" rx="4" class="blue-mid"/>
  <rect x="336" y="318" width="8" height="40" rx="3" class="gray-mid"/>
  <rect x="316" y="354" width="48" height="6" rx="3" class="gray-mid"/>
  <rect x="316" y="220" width="48" height="66" rx="14" class="blue-dark"/>
  <ellipse cx="340" cy="200" rx="24" ry="26" class="skin"/>
  <ellipse cx="340" cy="180" rx="24" ry="14" class="dark-fill"/>
  <rect x="316" y="180" width="48" height="14" rx="4" class="dark-fill"/>
  <ellipse cx="331" cy="200" rx="3" ry="3.5" class="skin-dark" opacity="0.4"/>
  <ellipse cx="349" cy="200" rx="3" ry="3.5" class="skin-dark" opacity="0.4"/>
  <path d="M333 210 Q340 216 347 210" fill="none" stroke="#C4705A" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="294" y="240" width="30" height="14" rx="7" class="blue-dark"/>
  <rect x="356" y="240" width="30" height="14" rx="7" class="blue-dark"/>
  <ellipse cx="291" cy="247" rx="10" ry="8" class="skin"/>
  <ellipse cx="389" cy="247" rx="10" ry="8" class="skin"/>

  <!-- Floating badges -->
  <rect x="490" y="100" width="120" height="36" rx="18" class="blue-dark"/>
  <text x="550" y="114" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Powered by</text>
  <text x="550" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" fill="white" font-weight="500">Claude AI</text>

  <rect x="70" y="100" width="110" height="36" rx="18" class="blue-pale"/>
  <text x="125" y="114" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2250F4">Files deleted in</text>
  <text x="125" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2250F4" font-weight="500">1 hour</text>

  <!-- Connecting dashed lines -->
  <line x1="180" y1="118" x2="268" y2="190" stroke="#2250F4" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="490" y1="118" x2="452" y2="190" stroke="#2250F4" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>

  <!-- Sparkle dots -->
  <circle cx="230" cy="160" r="4" class="blue-mid" opacity="0.5"/>
  <circle cx="220" cy="150" r="2.5" class="blue-light" opacity="0.5"/>
  <circle cx="240" cy="145" r="2" class="blue-mid" opacity="0.4"/>
  <circle cx="460" cy="160" r="4" class="blue-mid" opacity="0.5"/>
  <circle cx="470" cy="148" r="2.5" class="blue-light" opacity="0.5"/>
  <circle cx="450" cy="145" r="2" class="blue-mid" opacity="0.4"/>
</svg>
