    <!-- ── Cloud Storage Pickers ────────────────────────────────────────── -->
<!-- Dropbox Chooser SDK -->
<script src="https://www.dropbox.com/static/api/2/dropins.js"
        id="dropboxjs"
        data-app-key="gc1swzrvkh8l4rs"></script>

<!-- Google APIs -->
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>window.cloudPickers = {

            // ── Google Drive ──────────────────────────────────────────────
            // Client-side picker only — download routed through API proxy
            _googleClientId: '342984371109-kcpka8n5ildp8fg9u97tu3qlqed82eke.apps.googleusercontent.com',
            _googleDeveloperKey: 'AIzaSyDIIP3v7arpE2gWa-aWJ4Rqh9XS5wS693A',

            openGoogleDrive: function () {
                return new Promise((resolve) => {
                    gapi.load('picker', () => {
                        const tokenClient = google.accounts.oauth2.initTokenClient({
                            client_id: window.cloudPickers._googleClientId,
                            scope: 'https://www.googleapis.com/auth/drive.readonly',
                            callback: (tokenResponse) => {
                                if (tokenResponse.error) { resolve(null); return; }
                                const picker = new google.picker.PickerBuilder()
                                    .addView(new google.picker.DocsView()
                                        .setMimeTypes('application/pdf')
                                        .setMode(google.picker.DocsViewMode.LIST))
                                    .setOAuthToken(tokenResponse.access_token)
                                    .setDeveloperKey(window.cloudPickers._googleDeveloperKey)
                                    .setCallback((data) => {
                                        if (data.action === google.picker.Action.PICKED) {
                                            const doc = data.docs[0];
                                            resolve({
                                                name: doc.name,
                                                url: `https://www.googleapis.com/drive/v3/files/${doc.id}?alt=media`,
                                                accessToken: tokenResponse.access_token,
                                                size: doc.sizeBytes ?? 0
                                            });
                                        } else if (data.action === google.picker.Action.CANCEL) {
                                            resolve(null);
                                        }
                                    })
                                    .build();
                                picker.setVisible(true);
                            }
                        });
                        tokenClient.requestAccessToken({ prompt: '' });
                    });
                });
            },

            // ── Dropbox ───────────────────────────────────────────────────
            // Client-side picker only — download routed through API proxy
            openDropbox: function () {
                return new Promise((resolve) => {
                    Dropbox.choose({
                        success: function (files) {
                            const file = files[0];
                            resolve({
                                name: file.name,
                                url: file.link,
                                accessToken: null,
                                size: file.bytes ?? 0
                            });
                        },
                        cancel: function () { resolve(null); },
                        linkType: 'direct',
                        multiselect: false,
                        extensions: ['.pdf'],
                        folderselect: false
                    });
                });
            },

            // ── OneDrive ──────────────────────────────────────────────────
            // Auth is handled entirely server-side (see CloudStorageController).
            // This function only shows the file selection UI after the API
            // returns the file list via the OAuth callback redirect.
            showOneDriveFilePicker: function (files) {
                return new Promise((resolve) => {
                    const existing = document.getElementById('od-picker-overlay');
                    if (existing) existing.remove();

                    const overlay = document.createElement('div');
                    overlay.id = 'od-picker-overlay';
                    overlay.style.cssText = [
                        'position:fixed', 'top:0', 'left:0',
                        'width:100%', 'height:100%',
                        'background:rgba(0,0,0,0.55)', 'z-index:99999',
                        'display:flex', 'align-items:center',
                        'justify-content:center'
                    ].join(';');

                    const box = document.createElement('div');
                    box.style.cssText = [
                        'background:#fff', 'border-radius:12px', 'padding:24px',
                        'width:500px', 'max-height:65vh', 'overflow-y:auto',
                        'box-shadow:0 20px 60px rgba(0,0,0,0.3)',
                        'font-family:system-ui,sans-serif'
                    ].join(';');

                    box.innerHTML = `
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                            <div style="display:flex;align-items:center;gap:10px;">
                                <svg width="22" height="22" viewBox="0 0 24 24">
                                    <path d="M20.7 11.4c-.1-.6-.3-1.1-.6-1.6A5.6 5.6 0 0 0 14.7 7a5.5 5.5 0 0 0-4.6 2.5 3.3 3.3 0 0 0-1.4-.3A3.3 3.3 0 0 0 5.4 12a3.3 3.3 0 0 0 .1.7A4 4 0 0 0 4 16a4 4 0 0 0 4 4h12a4 4 0 0 0 .7-7.9z" fill="#0364B8"/>
                                </svg>
                                <h3 style="margin:0;font-size:1rem;color:#1a1a2e;">
                                    Select a PDF from OneDrive
                                </h3>
                            </div>
                            <button id="od-close"
                                style="background:none;border:none;font-size:1.4rem;cursor:pointer;color:#888;line-height:1;">
                                ×
                            </button>
                        </div>
                        <p style="font-size:0.8rem;color:#999;margin:0 0 12px;">
                            PDF files from your OneDrive root folder
                        </p>
                        <div id="od-file-list"></div>`;

                    const list = box.querySelector('#od-file-list');

                    files.forEach(file => {
                        const btn = document.createElement('button');
                        btn.style.cssText = [
                            'display:flex', 'align-items:center', 'gap:12px',
                            'width:100%', 'padding:10px 12px', 'margin-bottom:6px',
                            'border:1px solid #e8e8e8', 'border-radius:8px',
                            'background:#fff', 'cursor:pointer', 'text-align:left',
                            'font-size:0.875rem', 'color:#1a1a2e'
                        ].join(';');

                        const sizeKb = file.size
                            ? Math.round(file.size / 1024) : 0;
                        const sizeStr = sizeKb > 1024
                            ? (sizeKb / 1024).toFixed(1) + ' MB'
                            : sizeKb + ' KB';

                        btn.innerHTML = `
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="#e74c3c" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round"
                                style="flex-shrink:0;">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14,2 14,8 20,8"/>
                            </svg>
                            <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
                                ${file.name}
                            </span>
                            <span style="color:#aaa;font-size:0.78rem;flex-shrink:0;">
                                ${sizeStr}
                            </span>`;

                        btn.onmouseover = () => btn.style.background = '#f5f7ff';
                        btn.onmouseout = () => btn.style.background = '#fff';
                        btn.onclick = () => {
                            overlay.remove();
                            resolve({ name: file.name, url: file.url, size: file.size });
                        };
                        list.appendChild(btn);
                    });

                    box.querySelector('#od-close').onclick = () => {
                        overlay.remove();
                        resolve(null);
                    };

                    overlay.appendChild(box);
                    document.body.appendChild(overlay);
                });
            }
        };</script>
