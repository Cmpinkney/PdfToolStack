    <script>
        // ── MUST BE FIRST: patch navigator.permissions before Blazor WASM loads ──
        (function () {
            if (navigator.permissions && navigator.permissions.query) {
                const _origQuery = navigator.permissions.query.bind(navigator.permissions);
                navigator.permissions.query = function (params) {
                    try {
                        return _origQuery(params);
                    } catch (e) {
                        return Promise.resolve({ state: 'granted', onchange: null });
                    }
                };
            }
        })();

        (function () {
            const theme = localStorage.getItem('PdfToolStack-theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();

        window.setTheme = (theme) => {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            localStorage.setItem('PdfToolStack-theme', theme);
        };

        window.getTheme = () => localStorage.getItem('PdfToolStack-theme') || 'light';

        window.getSystemTheme = () =>
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('mainNavbar');
            if (navbar) {
                navbar.classList.toggle('scrolled', window.scrollY > 10);
            }
        });
    </script>

    <div id="app">
        <div style="text-align:center;padding:4rem;">
            <p>Loading...</p>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none">
        An error has occurred.
        <a href="" class="reload">Reload</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/Syncfusion.Blazor.SfPdfViewer/scripts/syncfusion-blazor-sfpdfviewer.min.js" type="text/javascript"></script>

    <script>
        // ── File Download ─────────────────────────────────────────────────
        window.downloadFile = (fileName, base64Data) => {
            const extension = fileName.split('.').pop().toLowerCase();
            const mimeTypes = {
                'pdf': 'application/pdf',
                'docx': 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'xlsx': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                'jpg': 'image/jpeg',
                'jpeg': 'image/jpeg',
                'png': 'image/png',
                'zip': 'application/zip'
            };
            const mimeType = mimeTypes[extension] || 'application/octet-stream';
            const link = document.createElement('a');
            link.href = `data:${mimeType};base64,` + base64Data;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // ── PDF.js worker ─────────────────────────────────────────────────
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // ── Redact PDF ────────────────────────────────────────────────────
        let dotNetHelper = null;
        let isDrawing = false;
        let startX = 0, startY = 0;
        let currentRegions = [];
        let pdfDoc = null;
        let redactColor = '#000000';
        let showRedactions = true; // before/after toggle

        window.initRedactCanvas = (helper) => {
            dotNetHelper = helper;
        };

        // Called from Blazor when user picks a color swatch
        window.setRedactColor = (color) => {
            redactColor = color;
            const canvas = document.getElementById('redactCanvas');
            if (canvas) redrawAllRegions(canvas);
        };

        // Called from Blazor before/after toggle
        window.setRedactBeforeAfter = (mode) => {
            showRedactions = (mode === 'after');
            const canvas = document.getElementById('redactCanvas');
            if (!canvas) return;
            canvas.style.opacity = showRedactions ? '1' : '0';
        };


        window.renderPdfPage = async (base64Data, pageNum) => {
            try {
                const pdfCanvas = document.getElementById('pdfCanvas');
                const redactCanvas = document.getElementById('redactCanvas');
                if (!pdfCanvas || !redactCanvas) return;

                const binaryData = atob(base64Data);
                const bytes = new Uint8Array(binaryData.length);
                for (let i = 0; i < binaryData.length; i++)
                    bytes[i] = binaryData.charCodeAt(i);

                pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
                const page = await pdfDoc.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.5 });

                pdfCanvas.width = viewport.width;
                pdfCanvas.height = viewport.height;
                redactCanvas.width = viewport.width;
                redactCanvas.height = viewport.height;

                const ctx = pdfCanvas.getContext('2d');
                await page.render({ canvasContext: ctx, viewport }).promise;

                currentRegions = [];
                clearRedactCanvas();
                setupCanvasEvents(redactCanvas);
            } catch (err) {
                console.error('Error rendering PDF:', err);
            }
        };

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function setupCanvasEvents(canvas) {
            if (!canvas || !canvas.parentNode) return;
            const newCanvas = canvas.cloneNode(true);
            canvas.parentNode.replaceChild(newCanvas, canvas);
            newCanvas.style.cursor = 'crosshair';
            newCanvas.style.position = 'absolute';
            newCanvas.style.top = '0';
            newCanvas.style.left = '0';
            newCanvas.style.opacity = showRedactions ? '1' : '0';

            newCanvas.addEventListener('mousedown', (e) => {
                const rect = newCanvas.getBoundingClientRect();
                startX = (e.clientX - rect.left) * (newCanvas.width / rect.width);
                startY = (e.clientY - rect.top) * (newCanvas.height / rect.height);
                isDrawing = true;
            });

            newCanvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                const rect = newCanvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (newCanvas.width / rect.width);
                const y = (e.clientY - rect.top) * (newCanvas.height / rect.height);
                const ctx = newCanvas.getContext('2d');
                ctx.clearRect(0, 0, newCanvas.width, newCanvas.height);
                // Redraw committed regions
                currentRegions.forEach(r => {
                    ctx.fillStyle = hexToRgba(r.color || redactColor, 0.92);
                    ctx.fillRect(r.x1, r.y1, r.x2 - r.x1, r.y2 - r.y1);
                });
                // Draw in-progress rect
                ctx.fillStyle = hexToRgba(redactColor, 0.5);
                ctx.fillRect(startX, startY, x - startX, y - startY);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 3]);
                ctx.strokeRect(startX, startY, x - startX, y - startY);
                ctx.setLineDash([]);
            });

            newCanvas.addEventListener('mouseup', (e) => {
                if (!isDrawing) return;
                isDrawing = false;
                const rect = newCanvas.getBoundingClientRect();
                const endX = (e.clientX - rect.left) * (newCanvas.width / rect.width);
                const endY = (e.clientY - rect.top) * (newCanvas.height / rect.height);
                const x1 = Math.min(startX, endX);
                const y1 = Math.min(startY, endY);
                const x2 = Math.max(startX, endX);
                const y2 = Math.max(startY, endY);
                if (x2 - x1 > 5 && y2 - y1 > 5) {
                    currentRegions.push({ x1, y1, x2, y2, color: redactColor });
                    if (dotNetHelper) dotNetHelper.invokeMethodAsync('AddRegion', x1, y1, x2, y2);
                }
                redrawAllRegions(newCanvas);
            });
        }

        function redrawAllRegions(canvas) {
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            currentRegions.forEach(r => {
                ctx.fillStyle = hexToRgba(r.color || redactColor, 0.92);
                ctx.fillRect(r.x1, r.y1, r.x2 - r.x1, r.y2 - r.y1);
            });
        }

        window.drawRedactPreview = () => { };

        window.redrawRegions = (regions) => {
            currentRegions = regions.map(r => ({ x1: r.x1, y1: r.y1, x2: r.x2, y2: r.y2, color: redactColor }));
            const canvas = document.getElementById('redactCanvas');
            if (canvas) redrawAllRegions(canvas);
        };

        window.clearRedactCanvas = () => {
            currentRegions = [];
            const canvas = document.getElementById('redactCanvas');
            if (!canvas) return;
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        };

        // ── Crop PDF Preview ─────────────────────────────────────────────────
        window.renderCropPreview = async (base64Data, pageNum) => {
            try {
                const canvas = document.getElementById('cpPdfCanvas');
                if (!canvas) return;
                const bytes = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
                const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
                const page = await pdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.4 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            } catch (e) { console.error('renderCropPreview error', e); }
        };

        // ── Number Pages Preview ─────────────────────────────────────────────
        window.renderNpPreview = async (base64Data, pageNum) => {
            try {
                const canvas = document.getElementById('npPdfCanvas');
                if (!canvas) return;
                const bytes = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
                const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
                const page = await pdf.getPage(pageNum);
                const viewport = page.getViewport({ scale: 1.4 });
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
            } catch (e) { console.error('renderNpPreview error', e); }
        };

        // ── PDF Utilities ─────────────────────────────────────────────────
        window.getPdfPageCount = async (base64Data) => {
            const bytes = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
            const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
            return pdf.numPages;
        };

        window.renderPdfReaderPage = async (base64Data, pageNum, scale) => {
            const canvas = document.getElementById('pdfReaderCanvas');
            if (!canvas) return;
            const bytes = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
            const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
            const page = await pdf.getPage(pageNum);
            const viewport = page.getViewport({ scale: scale || 1.0 });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;
        };

        // ── Signature Pad ─────────────────────────────────────────────────
        let signatureDotNet = null;
        let isSignDrawing = false;
        let signColor = '#000000';

        window.initSignaturePad = (dotNet) => {
            signatureDotNet = dotNet;
            setTimeout(() => setupSignaturePad(), 300);
        };

        function setupSignaturePad() {
            const canvas = document.getElementById('signatureCanvas');
            if (!canvas) { setTimeout(setupSignaturePad, 200); return; }
            if (canvas.dataset.bound === 'true') return;
            canvas.dataset.bound = 'true';

            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = signColor;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            canvas.addEventListener('mousedown', (e) => {
                isSignDrawing = true;
                const r = canvas.getBoundingClientRect();
                ctx.strokeStyle = signColor;
                ctx.beginPath();
                ctx.moveTo(
                    (e.clientX - r.left) * (canvas.width / r.width),
                    (e.clientY - r.top) * (canvas.height / r.height));
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isSignDrawing) return;
                const r = canvas.getBoundingClientRect();
                ctx.lineTo(
                    (e.clientX - r.left) * (canvas.width / r.width),
                    (e.clientY - r.top) * (canvas.height / r.height));
                ctx.stroke();
            });

            canvas.addEventListener('mouseup', () => {
                isSignDrawing = false;
                // Update _lastSigData after each stroke so drag preview works
                window._lastSigData = canvas.toDataURL('image/png');
            });

            canvas.addEventListener('mouseleave', () => {
                isSignDrawing = false;
                window._lastSigData = canvas.toDataURL('image/png');
            });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                isSignDrawing = true;
                const r = canvas.getBoundingClientRect();
                const t = e.touches[0];
                ctx.strokeStyle = signColor;
                ctx.beginPath();
                ctx.moveTo(
                    (t.clientX - r.left) * (canvas.width / r.width),
                    (t.clientY - r.top) * (canvas.height / r.height));
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isSignDrawing) return;
                const r = canvas.getBoundingClientRect();
                const t = e.touches[0];
                ctx.lineTo(
                    (t.clientX - r.left) * (canvas.width / r.width),
                    (t.clientY - r.top) * (canvas.height / r.height));
                ctx.stroke();
            }, { passive: false });

            canvas.addEventListener('touchend', () => {
                isSignDrawing = false;
                window._lastSigData = canvas.toDataURL('image/png');
            });
        }

        window.clearSignaturePad = () => {
            const canvas = document.getElementById('signatureCanvas');
            if (!canvas) return;
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
        };

        window.getSignatureImage = () => {
            const canvas = document.getElementById('signatureCanvas');
            if (!canvas) return null;
            return canvas.toDataURL('image/png');
        };

        window.setSignatureColor = (color) => {
            signColor = color;
            const canvas = document.getElementById('signatureCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.strokeStyle = color;
        };

        // ── Sign PDF ──────────────────────────────────────────────────────
        window.signPdfRenderPage = async (base64Data, pageNum) => {
            const canvas = document.getElementById('signPdfCanvas');
            const overlay = document.getElementById('signOverlayCanvas');
            if (!canvas) return;

            const bytes = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
            const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
            const page = await pdf.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1.2 });

            canvas.width = viewport.width;
            canvas.height = viewport.height;
            canvas.style.width = '100%';
            canvas.style.height = 'auto';

            if (overlay) {
                overlay.width = viewport.width;
                overlay.height = viewport.height;
                overlay.style.width = '100%';
                overlay.style.height = '100%';
            }

            const ctx = canvas.getContext('2d');
            await page.render({ canvasContext: ctx, viewport }).promise;
        };

        window.signPdfInitDrag = (dotNetRef) => {
            const overlay = document.getElementById('signOverlayCanvas');
            if (!overlay) return;

            const newOverlay = overlay.cloneNode(true);
            overlay.parentNode.replaceChild(newOverlay, overlay);
            const o = document.getElementById('signOverlayCanvas');

            let dragging = false;

            o.addEventListener('mousedown', async (e) => {
                // Grab fresh signature data at drag start
                let sigData = window._lastSigData;
                if (!sigData || sigData === 'data:,') return;
                dragging = true;
                e.preventDefault();
                const coords = getOverlayCoords(o, e.clientX, e.clientY);
                window._lastSigX = coords[0] - 100;
                window._lastSigY = coords[1] - 40;
                _drawSigPreview(o, sigData, window._lastSigX, window._lastSigY);
            });

            o.addEventListener('mousemove', (e) => {
                if (!dragging || !window._lastSigData) return;
                const coords = getOverlayCoords(o, e.clientX, e.clientY);
                window._lastSigX = coords[0] - 100;
                window._lastSigY = coords[1] - 40;
                _drawSigPreview(o, window._lastSigData, window._lastSigX, window._lastSigY);
            });

            o.addEventListener('mouseup', () => {
                if (!dragging) return;
                dragging = false;
                dotNetRef.invokeMethodAsync('OnSignaturePlaced',
                    window._lastSigX || 0,
                    window._lastSigY || 0);
            });

            o.addEventListener('mouseleave', () => {
                if (!dragging) return;
                dragging = false;
                dotNetRef.invokeMethodAsync('OnSignaturePlaced',
                    window._lastSigX || 0,
                    window._lastSigY || 0);
            });
        };

        window.signPdfGetScale = () => {
            const pdfCanvas = document.getElementById('signPdfCanvas');
            if (!pdfCanvas) return [1, 1];
            // pdfCanvas.width is viewport pixels at 1.2 scale
            // To get PDF points: divide by 1.2 (undo render scale),
            // then divide by pdfCanvas.width to get points-per-pixel ratio
            // But we need absolute points, so just return the divisor per pixel:
            // PDF point width = pdfCanvas.width / 1.2
            // So: pdfPoints = canvasPixels * (pdfPointWidth / canvasPixelWidth)
            //              = canvasPixels * (pdfCanvas.width/1.2) / pdfCanvas.width
            //              = canvasPixels / 1.2
            return [1 / 1.2, 1 / 1.2];
        };

        window.signPdfGetCanvasInternalHeight = () => {
            const overlay = document.getElementById('signOverlayCanvas');
            return overlay ? overlay.height : 0;
        };

        window.signPdfGetCanvasHeightPx = () => {
            const canvas = document.getElementById('signOverlayCanvas');
            return canvas ? canvas.getBoundingClientRect().height : 0;
        };

        window.signPdfSetLastSig = (sigData) => {
            window._lastSigData = sigData;
        };

        window.scrollToTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });

        function getOverlayCoords(overlay, clientX, clientY) {
            const rect = overlay.getBoundingClientRect();
            return [
                (clientX - rect.left) * (overlay.width / rect.width),
                (clientY - rect.top) * (overlay.height / rect.height)
            ];
        }

        window.signPdfDrawPreview = (sigDataUrl, x, y) => {
            const overlay = document.getElementById('signOverlayCanvas');
            if (!overlay || !sigDataUrl || sigDataUrl === 'data:,') return;
            window._lastSigData = sigDataUrl;
            window._lastSigX = x;
            window._lastSigY = y;
            _drawSigPreview(overlay, sigDataUrl, x, y);
        };

        function _drawSigPreview(overlay, sigDataUrl, x, y) {
            const ctx = overlay.getContext('2d');
            ctx.clearRect(0, 0, overlay.width, overlay.height);
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, x, y, 200, 80);
                ctx.strokeStyle = '#2250F4';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 3]);
                ctx.strokeRect(x, y, 200, 80);
                ctx.setLineDash([]);
            };
            img.src = sigDataUrl;
        }

        window.signPdfClearOverlay = () => {
            const overlay = document.getElementById('signOverlayCanvas');
            if (!overlay) return;
            overlay.getContext('2d').clearRect(0, 0, overlay.width, overlay.height);
        };

        window.signPdfGenerateTypedSig = (text, color) => {
            if (!text) return 'data:,';
            const canvas = document.createElement('canvas');
            canvas.width = 400;
            canvas.height = 120;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = color || '#000000';
            ctx.font = "italic 52px 'Brush Script MT', cursive";
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 10, 60);
            return canvas.toDataURL('image/png');
        };

        // ── PDF Editor (Edit PDF + Annotator) ─────────────────────────────
        window.pdfEditor = (() => {
            let pdfDoc = null;
            let currentPage = 1;
            let totalPages = 0;
            let scale = 1.5;
            let annotations = [];
            let currentTool = null;
            let isDrawing = false;
            let currentPathPoints = [];
            let containerId = null;

            function init(base64Data, fileName, containerIdParam) {
                containerId = containerIdParam;
                const container = document.getElementById(containerId);
                if (!container) return;

                container.innerHTML = buildEditorHTML(fileName);
                bindToolbar(container);

                const pdfBytes = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));

                pdfjsLib.getDocument({ data: pdfBytes }).promise.then(pdf => {
                    pdfDoc = pdf;
                    totalPages = pdf.numPages;
                    container.querySelector('#pdf-page-count').textContent = totalPages;
                    renderPage(currentPage, container);
                });

                window._pdfBase64 = base64Data;
                window._pdfFileName = fileName;
            }

            function buildEditorHTML(fileName) {
                return `
                                        <div class="pdf-editor-wrap">
                                          <div class="pdf-toolbar">
                                            <div class="pdf-toolbar-left">
                                              <button class="pdf-tool-btn" data-tool="null" title="Select">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 3l14 9-7 1-4 7z"/></svg>
                                              </button>
                                              <button class="pdf-tool-btn" data-tool="text" title="Add Text">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
                                                Text
                                              </button>
                                              <button class="pdf-tool-btn" data-tool="highlight" title="Highlight">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
                                                Highlight
                                              </button>
                                              <button class="pdf-tool-btn" data-tool="draw" title="Draw">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
                                                Draw
                                              </button>
                                              <button class="pdf-tool-btn" data-tool="rect" title="Rectangle">
                                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                                                Shape
                                              </button>
                                              <div class="pdf-tool-divider"></div>
                                              <div class="pdf-color-palette" id="pdf-color-palette">
                                                <button class="pdf-color-swatch active" data-color="#000000" style="background:#000000"></button>
                                                <button class="pdf-color-swatch" data-color="#FF0000" style="background:#FF0000"></button>
                                                <button class="pdf-color-swatch" data-color="#FF8C00" style="background:#FF8C00"></button>

            function bindToolbar(container) {
                container.querySelectorAll('.pdf-tool-btn[data-tool]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        currentTool = btn.dataset.tool === 'null' ? null : btn.dataset.tool;
                        container.querySelectorAll('.pdf-tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                        if (currentTool) btn.classList.add('active');
                        updateCursor(container);
                    });
                });

                container.querySelectorAll('.pdf-color-swatch').forEach(swatch => {
                    swatch.addEventListener('click', () => {
                        container.querySelectorAll('.pdf-color-swatch').forEach(s => s.classList.remove('active'));
                        swatch.classList.add('active');
                        container.querySelector('#pdf-color-pick').value = swatch.dataset.color;
                    });
                });

                container.querySelector('#pdf-color-pick').addEventListener('input', () => {
                    container.querySelectorAll('.pdf-color-swatch').forEach(s => s.classList.remove('active'));
                });

                container.querySelector('#pdf-prev').addEventListener('click', () => {
                    if (currentPage > 1) { currentPage--; renderPage(currentPage, container); }
                });
                container.querySelector('#pdf-next').addEventListener('click', () => {
                    if (currentPage < totalPages) { currentPage++; renderPage(currentPage, container); }
                });
                container.querySelector('#pdf-zoom-in').addEventListener('click', () => {
                    scale = Math.min(scale + 0.25, 3.0);
                    renderPage(currentPage, container);
                });
                container.querySelector('#pdf-zoom-out').addEventListener('click', () => {
                    scale = Math.max(scale - 0.25, 0.5);
                    renderPage(currentPage, container);
                });
                container.querySelector('#pdf-undo').addEventListener('click', () => {
                    const pageAnns = annotations.filter(a => a.page === currentPage);
                    if (pageAnns.length > 0) {
                        annotations = annotations.filter(a => a !== pageAnns[pageAnns.length - 1]);
                        redrawOverlay(container);
                    }
                });
                container.querySelector('#pdf-save').addEventListener('click', () => saveAnnotatedPDF(container));
            }

            function updateCursor(container) {
                const area = container.querySelector('#pdf-canvas-container');
                if (!area) return;
                const cursors = { text: 'text', highlight: 'crosshair', draw: 'crosshair', rect: 'crosshair' };
                area.style.cursor = currentTool ? (cursors[currentTool] || 'default') : 'default';
            }

            function renderPage(num, container) {
                container.querySelector('#pdf-page-num').textContent = num;
                const loader = container.querySelector('#pdf-loader');
                const canvasContainer = container.querySelector('#pdf-canvas-container');
                if (loader) loader.style.display = 'flex';
                if (canvasContainer) canvasContainer.style.display = 'none';

                pdfDoc.getPage(num).then(page => {
                    const viewport = page.getViewport({ scale });
                    const canvas = container.querySelector('#pdf-canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    canvasContainer.style.width = viewport.width + 'px';
                    canvasContainer.style.height = viewport.height + 'px';

                    const svg = container.querySelector('#pdf-svg-overlay');
                    svg.setAttribute('width', viewport.width);
                    svg.setAttribute('height', viewport.height);
                    svg.style.width = viewport.width + 'px';
                    svg.style.height = viewport.height + 'px';

                    page.render({ canvasContext: ctx, viewport }).promise.then(() => {
                        if (loader) loader.style.display = 'none';
                        if (canvasContainer) canvasContainer.style.display = 'block';
                        redrawOverlay(container);
                        bindCanvasEvents(container, viewport);
                    });
                });
            }

            function bindCanvasEvents(container, viewport) {
                const svg = container.querySelector('#pdf-svg-overlay');
                const newSvg = svg.cloneNode(true);
                svg.parentNode.replaceChild(newSvg, svg);
                const activeSvg = container.querySelector('#pdf-svg-overlay');
                activeSvg.style.pointerEvents = 'all';

                let startX, startY, rectEl, inkPath;

                activeSvg.addEventListener('mousedown', e => {
                    if (!currentTool) return;
                    isDrawing = true;
                    const rect = activeSvg.getBoundingClientRect();
                    startX = e.clientX - rect.left;
                    startY = e.clientY - rect.top;
                    currentPathPoints = [{ x: startX, y: startY }];

                    if (currentTool === 'text') {
                        isDrawing = false;
                        const color = container.querySelector('#pdf-color-pick').value;
                        const fontSize = parseInt(container.querySelector('#pdf-font-size').value);
                        const text = prompt('Enter text:');
                        if (text) {
                            annotations.push({ type: 'text', page: currentPage, x: startX / scale, y: startY / scale, text, color, fontSize });
                            redrawOverlay(container);
                        }
                    } else if (currentTool === 'draw') {
                        inkPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        inkPath.setAttribute('stroke', container.querySelector('#pdf-color-pick').value);
                        inkPath.setAttribute('stroke-width', '2');
                        inkPath.setAttribute('fill', 'none');
                        inkPath.setAttribute('d', `M ${startX} ${startY}`);
                        activeSvg.appendChild(inkPath);
                    } else if (currentTool === 'rect') {
                        rectEl = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        rectEl.setAttribute('x', startX);
                        rectEl.setAttribute('y', startY);
                        rectEl.setAttribute('width', 0);
                        rectEl.setAttribute('height', 0);
                        rectEl.setAttribute('stroke', container.querySelector('#pdf-color-pick').value);
                        rectEl.setAttribute('stroke-width', '2');
                        rectEl.setAttribute('fill', 'none');
                        activeSvg.appendChild(rectEl);
                    } else if (currentTool === 'highlight') {
                        rectEl = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        rectEl.setAttribute('x', startX);
                        rectEl.setAttribute('y', startY);
                        rectEl.setAttribute('width', 0);
                        rectEl.setAttribute('height', 20);
                        rectEl.setAttribute('fill', container.querySelector('#pdf-color-pick').value);
                        rectEl.setAttribute('opacity', '0.35');
                        activeSvg.appendChild(rectEl);
                    }
                });

                activeSvg.addEventListener('mousemove', e => {
                    if (!isDrawing) return;
                    const rect = activeSvg.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    if (currentTool === 'draw' && inkPath) {
                        currentPathPoints.push({ x, y });
                        inkPath.setAttribute('d', inkPath.getAttribute('d') + ` L ${x} ${y}`);
                    } else if ((currentTool === 'rect' || currentTool === 'highlight') && rectEl) {
                        const w = x - startX;
                        const h = currentTool === 'highlight' ? 20 : y - startY;
                        rectEl.setAttribute('x', w < 0 ? x : startX);
                        rectEl.setAttribute('y', h < 0 ? y : startY);
                        rectEl.setAttribute('width', Math.abs(w));
                        rectEl.setAttribute('height', Math.abs(h));
                    }
                });

                activeSvg.addEventListener('mouseup', e => {
                    if (!isDrawing) return;
                    isDrawing = false;
                    const rect = activeSvg.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const color = container.querySelector('#pdf-color-pick').value;

                    if (currentTool === 'draw') {
                        annotations.push({ type: 'ink', page: currentPage, points: [...currentPathPoints], color, scale });
                        inkPath = null;
                    } else if (currentTool === 'rect') {
                        annotations.push({ type: 'rect', page: currentPage, x: Math.min(startX, x) / scale, y: Math.min(startY, y) / scale, width: Math.abs(x - startX) / scale, height: Math.abs(y - startY) / scale, color });
                    } else if (currentTool === 'highlight') {
                        annotations.push({ type: 'highlight', page: currentPage, x: Math.min(startX, x) / scale, y: startY / scale, width: Math.abs(x - startX) / scale, height: 20 / scale, color });
                    }
                    redrawOverlay(container);
                });
            }

            function redrawOverlay(container) {
                const svg = container.querySelector('#pdf-svg-overlay');
                if (!svg) return;
                svg.innerHTML = '';

                annotations.filter(a => a.page === currentPage).forEach(a => {
                    if (a.type === 'text') {
                        const el = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        el.setAttribute('x', a.x * scale);
                        el.setAttribute('y', a.y * scale);
                        el.setAttribute('fill', a.color);
                        el.setAttribute('font-size', a.fontSize);
                        el.setAttribute('font-family', 'Arial, sans-serif');
                        el.textContent = a.text;
                        svg.appendChild(el);
                    } else if (a.type === 'ink') {
                        const el = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                        const d = a.points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
                        el.setAttribute('d', d);
                        el.setAttribute('stroke', a.color);
                        el.setAttribute('stroke-width', '2');
                        el.setAttribute('fill', 'none');
                        svg.appendChild(el);
                    } else if (a.type === 'rect') {
                        const el = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        el.setAttribute('x', a.x * scale);
                        el.setAttribute('y', a.y * scale);
                        el.setAttribute('width', a.width * scale);
                        el.setAttribute('height', a.height * scale);
                        el.setAttribute('stroke', a.color);
                        el.setAttribute('stroke-width', '2');
                        el.setAttribute('fill', 'none');
                        svg.appendChild(el);
                    } else if (a.type === 'highlight') {
                        const el = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                        el.setAttribute('x', a.x * scale);
                        el.setAttribute('y', a.y * scale);
                        el.setAttribute('width', a.width * scale);
                        el.setAttribute('height', a.height * scale);
                        el.setAttribute('fill', a.color);
                        el.setAttribute('opacity', '0.35');
                        svg.appendChild(el);
                    }
                });
            }

            async function saveAnnotatedPDF(container) {
                const btn = container.querySelector('#pdf-save');
                btn.textContent = 'Saving...';
                btn.disabled = true;
                try {
                    const payload = {
                        pdfBase64: window._pdfBase64,
                        fileName: window._pdfFileName,
                        annotations: annotations
                    };
                    const response = await fetch('https://localhost:7100/api/annotation/apply', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('Server error');
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = (window._pdfFileName || 'annotated').replace('.pdf', '') + '_annotated.pdf';
                    a.click();
                    URL.revokeObjectURL(url);
                    btn.innerHTML = '✓ Downloaded';
                    setTimeout(() => { btn.innerHTML = '⬇ Download'; btn.disabled = false; }, 3000);
                } catch (err) {
                    btn.textContent = 'Error — try again';
                    btn.disabled = false;
                }
            }

            return { init };
        })();
    </script>

    <script>
        window.pdfInterop = {
            createBlobUrlFromBase64: (base64) => {
                const binary = atob(base64);
                const len = binary.length;
                const bytes = new Uint8Array(len);

                for (let i = 0; i < len; i++) {
                    bytes[i] = binary.charCodeAt(i);
                }

                const blob = new Blob([bytes], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);
                return url;
            },

            revokeBlobUrl: (url) => {
                if (url) URL.revokeObjectURL(url);
            }
        };

            downloadFileAsBase64: async function (url, accessToken) {
                try {
                    const proxyUrl = `https://localhost:7100/api/cloud/download?url=${encodeURIComponent(url)}${accessToken ? '&token=' + encodeURIComponent(accessToken) : ''}`;
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), 30000);
                    const response = await fetch(proxyUrl, { signal: controller.signal });
                    clearTimeout(timeout);
                    if (!response.ok) { console.error('Cloud proxy download failed:', response.status); return null; }
                    const buffer = await response.arrayBuffer();
                    const bytes = new Uint8Array(buffer);
                    let binary = '';
                    const chunkSize = 8192;
                    for (let i = 0; i < bytes.length; i += chunkSize)
                        binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
                    return btoa(binary);
                } catch (e) {
                    console.error('Cloud file download failed', e);
                    return null;
                }
            }
        };

    <script>
        // SF Viewer ready detection — MutationObserver watches for rendered pages
        window.sfViewerObserver = {
            _obs: null,
            _startTime: 0,
            _minVisible: 1500, // overlay shows for at least 1.5s no matter how fast SF fires

            start: function (wrapId, dotNetRef) {
                this._startTime = Date.now();
                const wrap = document.getElementById(wrapId);

                if (!wrap) {
                    setTimeout(() => this.start(wrapId, dotNetRef), 250);
                    return;
                }

                const fire = () => {
                    const elapsed = Date.now() - this._startTime;
                    const remaining = Math.max(0, this._minVisible - elapsed);

                    setTimeout(() => {
                        // Wait two animation frames so the browser has time to paint
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                try {
                                    dotNetRef.invokeMethodAsync('OnViewerReady');
                                } catch { }
                            });
                        });
                    }, remaining);
                };

                this._obs = new MutationObserver(() => {
                    if (wrap.querySelector('.e-pv-page-div')) {
                        this._obs.disconnect();
                        this._obs = null;
                        fire();
                    }
                });

                this._obs.observe(wrap, { childList: true, subtree: true });

                // Hard fallback: 30s
                setTimeout(() => {
                    if (this._obs) {
                        this._obs.disconnect();
                        this._obs = null;
                        fire();
                    }
                }, 30000);
            },

            stop: function () {
                if (this._obs) {
                    this._obs.disconnect();
                    this._obs = null;
                }
            }
        };
    </script>

                if (!el) return;

                el.scrollIntoView({
                    behavior: smooth ? 'smooth' : 'auto',
                    block: 'start'
                });
            }
        };
    </script>

</body>
</html>
