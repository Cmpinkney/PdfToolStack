name: Deploy ExcelToolStack — Azure Static Web Apps

on:
  push:
    branches:
      - master
      - staging
    paths:
      - 'ExcelToolStack.Web/**'
      - 'PdfToolStack.Application/**'
      - 'PdfToolStack.Domain/**'
      - '.github/workflows/excel-static-web-apps.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
    paths:
      - 'ExcelToolStack.Web/**'

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy ExcelToolStack

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ExcelToolStack.Web/ExcelToolStack.Web.csproj

      - name: Build solution
        run: dotnet build ExcelToolStack.Web/ExcelToolStack.Web.csproj --configuration Release --no-restore

      - name: Publish ExcelToolStack.Web
        run: |
          dotnet publish ExcelToolStack.Web/ExcelToolStack.Web.csproj \
            --configuration Release \
            --output publish_excel \
            --no-build

      - name: Copy staticwebapp.config.json
        run: |
          cp ExcelToolStack.Web/wwwroot/staticwebapp.config.json \
             publish_excel/wwwroot/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.EXCEL_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'publish_excel/wwwroot'
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request

    steps:
      - name: Close PR environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.EXCEL_STATIC_WEB_APPS_TOKEN }}
          action: 'close'
