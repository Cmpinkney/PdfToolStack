name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore PdfToolStack.sln

      - name: Build solution
        run: dotnet build PdfToolStack.sln --configuration Release --no-restore

      - name: Clean publish output
        run: rm -rf publish_output

      - name: Publish Blazor app
        env:
          BLAZOR_ENV: ${{ github.ref_name == 'staging' && 'Staging' || 'Production' }}
        run: dotnet publish PdfToolStack.Web/PdfToolStack.Web.csproj --configuration Release --output publish_output /p:BlazorEnvironment=$BLAZOR_ENV /p:BlazorEnableCompression=true

      - name: Verify crawl files in publish output
        run: |
          ls -la publish_output/wwwroot/robots.txt
          ls -la publish_output/wwwroot/sitemap.xml

      - name: Copy staticwebapp config
        run: cp PdfToolStack.Web/wwwroot/staticwebapp.config.json publish_output/wwwroot/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_WAVE_02427A30F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "publish_output/wwwroot"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_WAVE_02427A30F }}
          action: "close"
          app_location: "publish_output/wwwroot"
