<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">ExcelToolStack app icon</title>
  <desc id="desc">A polished layered ExcelToolStack app icon with a green E tile and spreadsheet accent pixels.</desc>
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop stop-color="#E8F4EE"/>
      <stop offset="1" stop-color="#F8FAF7"/>
    </radialGradient>
    <linearGradient id="tile" x1="28" y1="18" x2="91" y2="98" gradientUnits="userSpaceOnUse">
