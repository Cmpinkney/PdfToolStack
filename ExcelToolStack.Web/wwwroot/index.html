<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExcelToolStack - AI Spreadsheet Workflows</title>
    <base href="/" />
    <meta name="description" content="ExcelToolStack is a premium workspace for AI spreadsheet workflows, templates, tools, and practical guides." />
    <link rel="canonical" href="https://exceltoolstack.com/" />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="apple-touch-icon" href="/images/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#075c46" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a1713" media="(prefers-color-scheme: dark)" />
    <script>
        (function () {
            const theme = localStorage.getItem('ExcelToolStack-theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();

        window.setTheme = (theme) => {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            localStorage.setItem('ExcelToolStack-theme', theme);
        };

        window.getTheme = () => localStorage.getItem('ExcelToolStack-theme') || 'light';

        window.getSystemTheme = () =>
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

        window.downloadFile = (fileName, base64Data) => {
            const ext = fileName.split('.').pop().toLowerCase();
            const mimeTypes = {
                'xlsx': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                'csv': 'text/csv',
                'xls': 'application/vnd.ms-excel'
            };
            const link = document.createElement('a');
            link.href = `data:${mimeTypes[ext] || 'application/octet-stream'};base64,` + base64Data;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        window.scrollToBottom = (id) => {
            const el = document.getElementById(id);
            if (el) el.scrollTop = el.scrollHeight;
        };

        window.excelCloudPickers = {
            _googleClientId: '342984371109-kcpka8n5ildp8fg9u97tu3qlqed82eke.apps.googleusercontent.com',
            _googleDeveloperKey: 'AIzaSyDIIP3v7arpE2gWa-aWJ4Rqh9XS5wS693A',

            openGoogleDrive: function () {
                return new Promise((resolve, reject) => {
                    if (!window.gapi || !window.google?.accounts?.oauth2) {
                        resolve(null); return;
                    }
                    gapi.load('picker', {
                        callback: () => {
                            const tokenClient = google.accounts.oauth2.initTokenClient({
                                client_id: window.excelCloudPickers._googleClientId,
                                scope: 'https://www.googleapis.com/auth/drive.readonly',
                                callback: (tokenResponse) => {
                                    if (tokenResponse.error) { resolve(null); return; }
                                    const picker = new google.picker.PickerBuilder()
                                        .addView(new google.picker.DocsView()
                                            .setMimeTypes('application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,text/csv')
                                            .setMode(google.picker.DocsViewMode.LIST))
                                        .setOAuthToken(tokenResponse.access_token)
                                        .setDeveloperKey(window.excelCloudPickers._googleDeveloperKey)
                                        .setCallback((data) => {
                                            if (data.action === google.picker.Action.PICKED) {
                                                const doc = data.docs[0];
                                                resolve({ name: doc.name, url: `https://www.googleapis.com/drive/v3/files/${doc.id}?alt=media`, accessToken: tokenResponse.access_token, size: doc.sizeBytes ?? 0 });
                                            } else if (data.action === google.picker.Action.CANCEL) {
                                                resolve(null);
                                            }
                                        }).build();
                                    picker.setVisible(true);
                                }
                            });
                            tokenClient.requestAccessToken({ prompt: '' });
                        },
                        onerror: () => reject(new Error('Google Picker failed to load.'))
                    });
                });
            },

            openDropbox: function () {
                return new Promise((resolve) => {
                    if (!window.Dropbox?.choose) { resolve(null); return; }
                    Dropbox.choose({
                        success: (files) => resolve({ name: files[0].name, url: files[0].link, accessToken: null, size: files[0].bytes ?? 0 }),
                        cancel: () => resolve(null),
                        linkType: 'direct',
                        multiselect: false,
                        extensions: ['.xlsx', '.xls', '.csv'],
                        folderselect: false
                    });
                });
            },

            downloadFileAsBase64: async function (url, accessToken) {
                try {
                    const proxyPath = `api/cloud/download?url=${encodeURIComponent(url)}${accessToken ? '&token=' + encodeURIComponent(accessToken) : ''}`;
                    const apiBase = (await fetch('/appsettings.json').then(r => r.json())).ApiBaseUrl || '';
                    const proxyUrl = apiBase.replace(/\/$/, '') + '/' + proxyPath;
                    const response = await fetch(proxyUrl);
                    if (!response.ok) return null;
                    const buffer = await response.arrayBuffer();
                    const bytes = new Uint8Array(buffer);
                    let binary = '';
                    for (let i = 0; i < bytes.length; i += 8192)
                        binary += String.fromCharCode(...bytes.subarray(i, i + 8192));
                    return btoa(binary);
                } catch (e) { console.error('Cloud download failed', e); return null; }
            }
        };
    </script>
    <script src="https://www.dropbox.com/static/api/2/dropins.js" id="dropboxjs" data-app-key="gc1swzrvkh8l4rs"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div class="loading-shell">
            <span class="brand-mark" aria-hidden="true">
                <img class="brand-mark__image brand-mark__image--light" src="images/brand/exceltoolstack-mark.svg" alt="" width="54" height="54" />
                <img class="brand-mark__image brand-mark__image--dark" src="images/brand/exceltoolstack-mark-dark.svg" alt="" width="54" height="54" />
            </span>
            <p>Loading ExcelToolStack</p>
        </div>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('xlNavbar');
            if (nav) nav.classList.toggle('scrolled', window.scrollY > 10);
        });
    </script>
</body>
</html>
