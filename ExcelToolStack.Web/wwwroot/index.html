<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExcelToolStack - AI Spreadsheet Workflows</title>
    <base href="/" />
    <meta name="description" content="ExcelToolStack is a premium workspace for AI spreadsheet workflows, templates, tools, and practical guides." />
    <link rel="canonical" href="https://exceltoolstack.com/" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="images/brand/exceltoolstack-app-icon.svg" />
    <meta name="theme-color" content="#075c46" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a1713" media="(prefers-color-scheme: dark)" />
    <script>
        (function () {
            const theme = localStorage.getItem('ExcelToolStack-theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();

        window.setTheme = (theme) => {
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.removeAttribute('data-theme');
            }
            localStorage.setItem('ExcelToolStack-theme', theme);
        };

        window.getTheme = () => localStorage.getItem('ExcelToolStack-theme') || 'light';

        window.getSystemTheme = () =>
            window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';

        window.scrollToBottom = (id) => {
            const el = document.getElementById(id);
            if (el) el.scrollTop = el.scrollHeight;
        };
    </script>
    <script src="_content/Microsoft.AspNetCore.Components.WebAssembly.Authentication/AuthenticationService.js"></script>
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div class="loading-shell">
            <span class="brand-mark" aria-hidden="true">
                <img class="brand-mark__image brand-mark__image--light" src="images/brand/exceltoolstack-mark.svg" alt="" width="54" height="54" />
                <img class="brand-mark__image brand-mark__image--dark" src="images/brand/exceltoolstack-mark-dark.svg" alt="" width="54" height="54" />
            </span>
            <p>Loading ExcelToolStack</p>
        </div>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
